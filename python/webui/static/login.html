<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenTrader — Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #070b14;
    --surface:  #0d1525;
    --border:   #1a2540;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --blue:     #3b82f6;
    --blue-h:   #2563eb;
    --red:      #ef4444;
    --green:    #22c55e;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-mark {
    width: 88px; height: 56px;
    background: rgba(59,130,246,.07);
    border: 1.5px solid rgba(59,130,246,.35);
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    padding: 6px 10px;
  }
  .logo-mark svg { width: 100%; height: 100%; display: block; }
  .logo h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -.02em;
    color: var(--text);
  }
  .logo p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  input[type=text], input[type=password] {
    width: 100%;
    background: #0a0e1a;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color .15s;
    margin-bottom: 18px;
  }
  input:focus { border-color: var(--blue); }
  button[type=submit] {
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    padding: 11px;
    cursor: pointer;
    transition: background .15s;
  }
  button[type=submit]:hover { background: var(--blue-h); }
  button[type=submit]:disabled { opacity: .5; cursor: not-allowed; }
  .error {
    background: rgba(239,68,68,.1);
    border: 1px solid rgba(239,68,68,.3);
    border-radius: 8px;
    color: #fca5a5;
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: none;
  }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .https-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 68 40" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- Bull: body left, head facing right -->
        <ellipse cx="14" cy="27" rx="10" ry="7"/>
        <path d="M21 24 C23 22 25 21 27 21"/>
        <circle cx="27" cy="21" r="5.5"/>
        <path d="M24 16 Q21 10 23 8"/>
        <path d="M30 16 Q33 10 31 8"/>
        <ellipse cx="32" cy="23" rx="2" ry="1.5"/>
        <circle cx="28" cy="19" r="1" fill="#3b82f6" stroke="none"/>
        <line x1="7" y1="33" x2="6" y2="39"/>
        <line x1="11" y1="34" x2="11" y2="39"/>
        <line x1="17" y1="34" x2="18" y2="39"/>
        <line x1="21" y1="33" x2="21" y2="39"/>
        <path d="M4 24 Q1 20 3 16"/>
        <!-- Bear: body right, head facing left -->
        <ellipse cx="54" cy="27" rx="10" ry="7"/>
        <path d="M47 24 C45 22 43 21 41 21"/>
        <circle cx="41" cy="21" r="5.5"/>
        <circle cx="38" cy="16" r="2.5"/>
        <circle cx="44" cy="16" r="2.5"/>
        <ellipse cx="36" cy="23" rx="2" ry="1.5"/>
        <circle cx="40" cy="19" r="1" fill="#3b82f6" stroke="none"/>
        <line x1="61" y1="33" x2="62" y2="39"/>
        <line x1="57" y1="34" x2="57" y2="39"/>
        <line x1="51" y1="34" x2="50" y2="39"/>
        <line x1="47" y1="33" x2="47" y2="39"/>
        <path d="M64 24 Q67 20 65 16"/>
      </svg>
    </div>
    <h1>OpenTrader</h1>
    <p>Command Center</p>
  </div>

  <div id="error-box" class="error"></div>

  <form id="login-form" onsubmit="doLogin(event)">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username"
           placeholder="Enter username" autofocus required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password"
           placeholder="Enter password" required>

    <button type="submit" id="submit-btn">Sign In</button>
  </form>

  <div class="https-note">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    Secured by OpenTrader Auth
  </div>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const btn      = document.getElementById('submit-btn');
  const errBox   = document.getElementById('error-box');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  errBox.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
      credentials: 'same-origin',
    });
    const d = await r.json();
    if (r.ok && d.ok) {
      window.location.href = '/';
    } else {
      errBox.textContent  = d.detail || 'Invalid username or password.';
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch(err) {
    errBox.textContent  = 'Connection error — try again.';
    errBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
